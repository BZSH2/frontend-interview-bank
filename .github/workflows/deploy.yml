name: publish-runtime-images

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Normalize image namespace
        run: echo "IMAGE_NAMESPACE=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (api)
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend-interview-bank-api
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.node-runtime
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          cache-from: type=gha,scope=api-runtime
          cache-to: type=gha,mode=max,scope=api-runtime

      - name: Docker metadata (web)
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend-interview-bank-web
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push H5 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app-uni/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          cache-from: type=gha,scope=app-runtime
          cache-to: type=gha,mode=max,scope=app-runtime

      - name: Docker metadata (admin)
        id: meta_admin
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend-interview-bank-admin
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: admin-web/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_ADMIN_TOKEN=
          tags: ${{ steps.meta_admin.outputs.tags }}
          labels: ${{ steps.meta_admin.outputs.labels }}
          cache-from: type=gha,scope=admin-runtime
          cache-to: type=gha,mode=max,scope=admin-runtime

      - name: Publish summary
        run: |
          echo 'Published images:' >> "$GITHUB_STEP_SUMMARY"
          echo '- ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend-interview-bank-api:main' >> "$GITHUB_STEP_SUMMARY"
          echo '- ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend-interview-bank-web:main' >> "$GITHUB_STEP_SUMMARY"
          echo '- ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend-interview-bank-admin:main' >> "$GITHUB_STEP_SUMMARY"
          echo '- Immutable sha-* tags are published in the workflow output via docker/metadata-action.' >> "$GITHUB_STEP_SUMMARY"
