name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build api-server
        run: pnpm --filter api-server build

      - name: Build app-uni h5
        run: pnpm --filter app-uni build:h5

      - name: Build admin-web
        run: pnpm --filter admin-web build

      - name: Check runtime artifacts
        run: sh scripts/check-runtime-artifacts.sh
